# VectorWatch — Netlify configuration
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish   = "."           # serve index.html from repo root
  functions = "netlify/functions"  # serverless functions directory

# Redirect all /.netlify/functions/* calls correctly (default, but explicit)
[[redirects]]
  from   = "/.netlify/functions/*"
  to     = "/.netlify/functions/:splat"
  status = 200

# Cache static assets
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=60"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin  = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Accept"
