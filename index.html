<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>VectorWatch</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/protobufjs@7/dist/protobuf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d0f18;color:#e0e2ee;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh}
#topbar{display:flex;align-items:center;gap:6px;padding:8px 10px;background:#141720;border-bottom:1px solid #232636;flex-shrink:0;flex-wrap:wrap}
#logo{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;display:flex;align-items:center;gap:6px}
#logo span{color:#4fa8e8}
#search{flex:1;min-width:100px;background:#0d0f18;border:1px solid #232636;color:#e0e2ee;border-radius:7px;padding:5px 10px;font-size:13px;outline:none;-webkit-appearance:none}
#search:focus{border-color:#4fa8e8}
#search::placeholder{color:#3a3d52}
.pill{font-size:11px;padding:2px 9px;border-radius:10px;background:#1a1d2e;color:#6b6e8a;border:1px solid #232636;white-space:nowrap;flex-shrink:0}
#rbtn{font-size:14px;padding:4px 9px;border-radius:7px;background:#1a1d2e;color:#6b6e8a;border:1px solid #232636;cursor:pointer;flex-shrink:0;line-height:1;transition:color .15s}
#rbtn:hover{color:#e0e2ee}
#rbtn.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#logbtn{font-size:11px;padding:4px 9px;border-radius:7px;background:#1a1d2e;color:#6b6e8a;border:1px solid #232636;cursor:pointer;flex-shrink:0}

/* ── LOG PANEL — always running, toggled via display ────────── */
#logpanel{
  position:absolute;
  bottom:calc(20vh + 24px);
  left:0;right:0;
  z-index:2000;
  display:none;           /* hidden by default — never blocks map */
  flex-direction:column;
  height:260px;
  background:#0a0b10;
  border-top:1px solid #4fa8e8;
  font-family:ui-monospace,'Cascadia Code','Fira Code','Consolas',monospace;
  font-size:11px;
  line-height:1.45;
}
#logpanel.visible{
  display:flex;           /* shown — only when explicitly opened */
}
#logpanel.hidden{display:none}
#log-titlebar{
  display:flex;justify-content:space-between;align-items:center;
  padding:4px 10px;
  background:#111420;
  border-bottom:1px solid #1e2130;
  flex-shrink:0;
}
#log-title{
  color:#4fa8e8;font-weight:600;font-size:11px;letter-spacing:.03em;
  user-select:none;
}
#log-titlebar button{
  background:none;border:1px solid #2a2d42;color:#6b6e8a;
  font-size:10px;padding:2px 7px;border-radius:4px;cursor:pointer;
  font-family:inherit;transition:all .15s;
}
#log-titlebar button:hover{color:#e0e2ee;border-color:#4fa8e8}
#log-body{
  flex:1;overflow-y:auto;overflow-x:auto;
  padding:6px 0;
  /* custom scrollbar */
  scrollbar-width:thin;
  scrollbar-color:#2a2d42 #0a0b10;
}
#log-body::-webkit-scrollbar{width:6px;height:6px}
#log-body::-webkit-scrollbar-track{background:#0a0b10}
#log-body::-webkit-scrollbar-thumb{background:#2a2d42;border-radius:3px}
#log-body::-webkit-scrollbar-thumb:hover{background:#3a3d52}
#loglines{
  margin:0;padding:0 10px;
  white-space:pre;
  color:#c8cce8;
  /* no word-wrap — pure text file feel */
}
#log-statusbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:3px 10px;
  background:#0d0f18;
  border-top:1px solid #1e2130;
  font-size:10px;color:#3a3d52;
  flex-shrink:0;
}
.dtab{font-size:11px;padding:4px 10px;border-radius:7px;background:#1a1d2e;color:#6b6e8a;border:1px solid #232636;cursor:pointer;flex-shrink:0;transition:all .15s}
.dtab.on{color:#fff;background:#252840;border-color:#4fa8e8}
.dtab:hover:not(.on){color:#aaa}
#locbtn{font-size:13px;padding:4px 8px;border-radius:7px;background:#1a1d2e;color:#6b6e8a;border:1px solid #232636;cursor:pointer;flex-shrink:0;transition:color .15s}
#locbtn:hover{color:#4fa8e8}
#locbtn.active{color:#4fa8e8;border-color:#4fa8e8}
#filterbar{display:flex;align-items:center;gap:4px;padding:5px 10px;background:#0f1120;border-bottom:1px solid #1e2130;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#filterbar::-webkit-scrollbar{display:none}
.fb{font-size:11px;padding:4px 12px;border-radius:14px;border:1px solid #232636;background:transparent;color:#55587a;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px;transition:all .15s;flex-shrink:0}
.fb-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fb.f-all.on    {color:#c8cce8;border-color:#4fa8e8;background:#141e30}
.fb.f-comm.on   {color:#7dd460;border-color:#4a8830;background:#111e0e}
.fb.f-priv.on   {color:#a090f0;border-color:#5040a0;background:#131028}
.fb.f-mil.on    {color:#e8a040;border-color:#885010;background:#201408}
.fb.f-gov.on    {color:#48c8e8;border-color:#186878;background:#081820}
.fb.f-rescue.on {color:#e85858;border-color:#882020;background:#200808}
.fb.f-intel.on   {color:#e060e8;border-color:#801890;background:#180820}
.fb.f-special.on {color:#00e8c8;border-color:#007860;background:#001e18}
.fb.f-ufo.on     {color:#c8ff40;border-color:#607820;background:#181e04}
.fb.f-alert.on   {color:#ff4040;border-color:#a02020;background:#200808;animation:pulse .8s infinite}
#map{flex:1;min-height:0;position:relative}
#fetchring{position:absolute;top:12px;right:56px;width:16px;height:16px;border-radius:50%;border:2px solid transparent;border-top-color:#4fa8e8;z-index:999;pointer-events:none;opacity:0;transition:opacity .2s}
#fetchring.on{opacity:1;animation:spin .8s linear infinite}
#fab{display:none;position:absolute;bottom:calc(20vh + 12px);right:12px;z-index:1001;background:#4fa8e8;color:#fff;border:none;border-radius:20px;padding:7px 18px;font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.2px}
#fab.on{display:flex;align-items:center;gap:6px}

/* ── DETAIL PANEL — slides up from bottom, 20vh ── */
#detail{
  position:absolute;bottom:0;left:0;right:0;
  background:#141720;
  border-top:2px solid #232636;
  border-radius:14px 14px 0 0;
  z-index:1000;
  transform:translateY(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  height:20vh;min-height:180px;max-height:20vh;
  overflow:hidden;
  display:flex;flex-direction:column;
}
#detail.on{transform:translateY(0)}
#detail-handle{width:36px;height:4px;background:#2a2d42;border-radius:2px;margin:8px auto 0;flex-shrink:0;cursor:pointer}
#detail-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px 14px 10px;scrollbar-width:thin;scrollbar-color:#232636 transparent}
#detail-scroll::-webkit-scrollbar{width:3px}
#detail-scroll::-webkit-scrollbar-track{background:transparent}
#detail-scroll::-webkit-scrollbar-thumb{background:#232636;border-radius:2px}

/* ── DETAIL INNER LAYOUT ── */
.d-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.d-callsign{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.5px;line-height:1}
.d-subtitle{font-size:12px;color:#6b6e8a;margin-top:2px}
.d-badges{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:3px}
.d-close{background:rgba(255,255,255,.07);border:none;color:#aaa;font-size:16px;cursor:pointer;padding:4px 8px;border-radius:6px;line-height:1;flex-shrink:0;margin-left:8px}
.d-close:hover{background:rgba(255,255,255,.13);color:#fff}
.ctag{font-size:11px;padding:3px 10px;border-radius:8px;font-weight:500;white-space:nowrap;border:1px solid}
.ct-commercial{color:#7dd460;background:#0e1a08;border-color:#3a6020}
.ct-private    {color:#a090f0;background:#100e28;border-color:#4030a0}
.ct-military   {color:#e8a040;background:#1e1008;border-color:#785010}
.ct-government {color:#48c8e8;background:#061620;border-color:#106878}
.ct-rescue     {color:#e85858;background:#200808;border-color:#782020}
.ct-intel      {color:#e060e8;background:#160820;border-color:#700880}
.ct-unknown    {color:#6b6e8a;background:#161820;border-color:#2a2d42}
.ct-drone      {color:#00e8c8;background:#001e18;border-color:#007860}
.ct-balloon    {color:#40c8ff;background:#00101e;border-color:#006090}
.ct-ultralight {color:#e8d040;background:#1e1800;border-color:#806000}
.ct-glider     {color:#a0d0ff;background:#081020;border-color:#204870}
.ct-special    {color:#00e8c8;background:#001e18;border-color:#007860}
.ct-ufo        {color:#c8ff40;background:#101800;border-color:#507010}
.ct-alert      {color:#ff4040;background:#200404;border-color:#a01010;animation:pulse .8s infinite}
.intel-tag{display:inline-flex;align-items:center;gap:4px;background:#1a0826;border:1px solid #800890;border-radius:8px;padding:3px 10px;font-size:11px;color:#e060e8;font-weight:500}
.sq-normal  {background:#0a1a06;color:#7dd460;border:1px solid #3a6020;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:500}
.sq-emerg   {background:#220404;color:#ff5555;border:1px solid #882020;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;animation:pulse 1s infinite}
.sq-hijack  {background:#221604;color:#ffaa00;border:1px solid #885020;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;animation:pulse 1s infinite}
.sq-radio   {background:#0e0e22;color:#a090f0;border:1px solid #4030a0;border-radius:8px;padding:3px 10px;font-size:11px;font-weight:500}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}

/* ── TWO-COLUMN BODY ── */
.d-body{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start}
.d-photo{width:80px;height:54px;object-fit:cover;border-radius:8px;border:1px solid #2a2d42;background:#0d0f18;flex-shrink:0}
.d-photo-ph{width:80px;height:54px;border-radius:8px;border:1px solid #2a2d42;background:#0d0f18;display:flex;align-items:center;justify-content:center;font-size:24px;color:#2a2d42}
.d-fields{display:grid;grid-template-columns:1fr 1fr;gap:3px 12px}
.d-field{}
.d-label{font-size:9px;color:#45485e;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1px}
.d-value{font-size:12px;font-weight:600;color:#e0e2ee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-value.mono{font-family:ui-monospace,monospace;font-size:11px}
.d-value.blue{color:#4fa8e8}
.d-value.green{color:#7dd460}
.d-value.amber{color:#e8a040}

/* ── ROUTE BAR ── */
.d-route{display:flex;align-items:stretch;gap:0;background:#0d0f18;border:1px solid #1e2130;border-radius:8px;overflow:hidden;margin-top:8px}
.d-airport{flex:1;padding:6px 10px;text-align:center}
.d-airport-code{font-size:18px;font-weight:700;color:#fff;line-height:1}
.d-airport-name{font-size:9px;color:#6b6e8a;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-route-mid{flex:1.4;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;border-left:1px solid #1e2130;border-right:1px solid #1e2130}
.d-route-line{width:100%;height:1px;background:linear-gradient(90deg,#7dd460 0%,#4fa8e8 100%);margin:3px 0}
.d-route-pct{font-size:9px;color:#6b6e8a}
.d-route-via{font-size:9px;color:#e8a040}

/* ── STAT GRID ── */
.d-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
.d-stat{background:#0d0f18;border:1px solid #1e2130;border-radius:7px;padding:5px 8px}
.d-stat-label{font-size:9px;color:#45485e;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.d-stat-value{font-size:13px;font-weight:600;color:#e0e2ee}
.d-stat-unit{font-size:9px;color:#6b6e8a;margin-left:2px}

/* ── STATUS & SBAR ── */
#sbar{background:#0a0c14;padding:3px 10px;font-size:10px;color:#3a3d52;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;border-top:1px solid #131520;gap:6px}
.s-ok{color:#3ecba8!important}.s-err{color:#e05050!important}.s-load{color:#e8a040!important}
#srcbadge{font-size:9px;padding:1px 7px;border-radius:5px;background:#1a1d2e;border:1px solid #232636;color:#6b6e8a;white-space:nowrap;flex-shrink:0}

/* ── LOG PANEL ── */
.hidden{display:none!important}

/* ── LEAFLET OVERRIDES ── */
.leaflet-control-zoom a{background:rgba(14,16,24,.9)!important;color:#aaa!important;border-color:#2a2d42!important}
.leaflet-control-zoom a:hover{background:rgba(30,33,48,.95)!important;color:#fff!important}
.leaflet-tooltip{background:rgba(14,16,24,.95);border:1px solid #2a2d42;color:#e0e2ee;font-size:12px;border-radius:7px;padding:5px 10px;box-shadow:0 4px 12px rgba(0,0,0,.5)}
.leaflet-control-attribution{background:rgba(0,0,0,.55)!important;color:#666!important;font-size:9px!important}
.leaflet-control-attribution a{color:#777!important}
.leaflet-attribution-flag{display:none!important}

#land-bar::-webkit-scrollbar{display:none}
.lc{font-size:11px;padding:3px 9px;border-radius:12px;border:1px solid #232636;background:transparent;color:#55587a;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.lc:hover{color:#aaa}
.lc.on{background:#141e30;border-color:#4fa8e8;color:#c8cce8}
/* Coverage info panel */
/* ── COVERAGE INFO PANEL — floating overlay, collapsible ── */
#cov-panel{
  position:absolute;
  top:54px;            /* just below Dark/NFZ buttons */
  right:12px;
  z-index:1001;
  width:260px;
  background:rgba(10,11,18,.96);
  border:1px solid #2a2d42;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.55);
  display:none;
  transition:box-shadow .2s;
}
#cov-panel.on{display:block}
/* Title bar — always visible, clickable to collapse */
#cov-panel-title{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;
  background:rgba(20,23,32,.98);
  border-bottom:1px solid #1e2130;
  cursor:pointer;
  user-select:none;
  gap:8px;
}
#cov-panel-title:hover{background:rgba(30,33,48,.98)}
#cov-panel-title-text{
  font-size:11px;font-weight:700;color:#fff;
  display:flex;align-items:center;gap:6px;flex:1;
}
#cov-panel-chevron{
  font-size:10px;color:#6b6e8a;
  transition:transform .2s;
  flex-shrink:0;
}
#cov-panel.minimized #cov-panel-chevron{transform:rotate(-90deg)}
/* Collapsible body */
#cov-panel-body{
  padding:10px 12px 12px;
  font-size:11px;line-height:1.6;color:#aab0c8;
  max-height:420px;
  overflow:hidden;
  transition:max-height .25s ease, padding .25s ease, opacity .2s ease;
  opacity:1;
}
#cov-panel.minimized #cov-panel-body{
  max-height:0;
  padding-top:0;padding-bottom:0;
  opacity:0;
}
#cov-panel .cv-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
#cov-panel .cv-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:3px}
#cov-panel .cv-text{color:#8a90a8;font-size:10px;line-height:1.55}
#cov-panel .cv-note{
  margin-top:8px;padding-top:8px;
  border-top:1px solid #1e2130;
  font-size:10px;color:#45485e;line-height:1.55;
}
#cov-panel .cv-src{color:#4fa8e8;font-size:10px}
@media(max-width:520px){
  .d-stats{grid-template-columns:repeat(2,1fr)}
  .d-fields{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">◈ <span>VectorWatch</span></div>
    <div id="domain-tabs" style="display:flex;gap:2px;flex-shrink:0">
      <button class="dtab on" id="tab-air" onclick="setDomain('air',this)" title="Air traffic">✈ Air</button>
      <button class="dtab"    id="tab-sea" onclick="setDomain('sea',this)" title="Maritime vessels">⚓ Sea</button>
      <button class="dtab"    id="tab-land" onclick="setDomain('land',this)" title="Sweden land transit">🚂 Land</button>
    </div>
    <input type="search" id="search" placeholder="Callsign, registration, type…" oninput="onSearch()"/>
    <span class="pill" id="pill">—</span>
    <button id="rbtn" onclick="fetchViewport(true)" title="Refresh">↻</button>
    <button id="locbtn" onclick="locateMe()" title="Locate me">📍</button>
    <button id="logbtn" onclick="toggleLog()" title="Toggle debug log">📋 Log</button>
  </div>
  <div id="filterbar">
    <button class="fb f-all on" onclick="setFilter('all',this)"><span class="fb-dot" style="background:#c8cce8"></span>✈ All flights</button>
    <button class="fb f-comm"   onclick="setFilter('commercial',this)"><span class="fb-dot" style="background:#7dd460"></span>✈ Commercial</button>
    <button class="fb f-priv"   onclick="setFilter('private',this)"><span class="fb-dot" style="background:#a090f0"></span>🛩 Private / GA</button>
    <button class="fb f-mil"    onclick="setFilter('military',this)"><span class="fb-dot" style="background:#e8a040"></span>⚔ Military</button>
    <button class="fb f-gov"    onclick="setFilter('government',this)"><span class="fb-dot" style="background:#48c8e8"></span>🏛 Government</button>
    <button class="fb f-rescue" onclick="setFilter('rescue',this)"><span class="fb-dot" style="background:#e85858"></span>🚑 Rescue / EMS</button>
    <button class="fb f-intel"  onclick="setFilter('intel',this)"><span class="fb-dot" style="background:#e060e8"></span>🔵 Intelligence</button>
    <button class="fb f-special" onclick="setFilter('special',this)"><span class="fb-dot" style="background:#00e8c8"></span>🤖 Drones / Balloons / Special</button>
    <button class="fb f-ufo"    onclick="setFilter('ufo',this)"><span class="fb-dot" style="background:#c8ff40"></span>❓ UFO — Unidentified</button>
    <button class="fb f-alert"  onclick="setFilter('alert',this)"><span class="fb-dot" style="background:#ff4040"></span>🚨 Emergency / Alert</button>
  </div>
  <!-- Land country selector — only visible in land domain -->
  <div id="land-bar" style="display:none;align-items:center;gap:4px;padding:4px 10px;background:#0a0c14;border-bottom:1px solid #1e2130;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;font-size:11px">
    <span style="color:#6b6e8a;white-space:nowrap;flex-shrink:0">🚂 Country:</span>
    <button class="lc on" id="lc-se" onclick="setLandCountry('SE',this)" style="background:#141e30;border-color:#4fa8e8;color:#c8cce8">🇸🇪 Sweden</button>
    <button class="lc"    id="lc-no" onclick="setLandCountry('NO',this)">🇳🇴 Norway</button>
    <button class="lc"    id="lc-fi" onclick="setLandCountry('FI',this)">🇫🇮 Finland</button>
    <button class="lc"    id="lc-dk" onclick="setLandCountry('DK',this)">🇩🇰 Denmark</button>
    <button class="lc"    id="lc-de" onclick="setLandCountry('DE',this)">🇩🇪 Germany</button>
    <button class="lc"    id="lc-nl" onclick="setLandCountry('NL',this)">🇳🇱 Netherlands</button>
    <button class="lc"    id="lc-fr" onclick="setLandCountry('FR',this)">🇫🇷 France</button>
    <button class="lc"    id="lc-ch" onclick="setLandCountry('CH',this)">🇨🇭 Switzerland</button>
    <button class="lc"    id="lc-at" onclick="setLandCountry('AT',this)">🇦🇹 Austria</button>
    <button class="lc"    id="lc-be" onclick="setLandCountry('BE',this)">🇧🇪 Belgium</button>
    <button class="lc"    id="lc-ie" onclick="setLandCountry('IE',this)">🇮🇪 Ireland</button>
  </div>

  <div id="map"><div id="fetchring"></div></div>

<!-- Coverage explanation panel — shown when a coverage overlay is active -->
<div id="cov-panel"></div>
  <div id="sbar"><span id="smsg">Initialising…</span><span id="srcbadge">—</span></div>
</div>

<button id="fab" onclick="activeDomain==='sea'?deselectVessel():activeDomain==='land'?deselectLand():deselect()">✕ Deselect</button>

<!-- LOG PANEL -->
<div id="logpanel">
  <div id="log-titlebar">
    <span id="log-title">📄 VectorWatch — debug.log</span>
    <div style="display:flex;gap:6px;align-items:center">
      <button id="log-save"  onclick="saveLog()"  title="Download as .log file">💾 Save file</button>
      <button id="log-copy"  onclick="copyLog()"  title="Copy all to clipboard">⎘ Copy</button>
      <button id="log-clear" onclick="clearLog()" title="Clear log">⌫ Clear</button>
      <button id="log-close" onclick="toggleLog()" title="Hide log panel">✕</button>
    </div>
  </div>
  <div id="log-body">
    <pre id="loglines"></pre>
  </div>
  <div id="log-statusbar">

function squawkStatus(sqk, emergency){

const RESCUE_PFX=['MEDEVAC','MEDVAC','SAR','RESCUE','HELIMED','AIRMED','LIFEFLIGHT','LIFEGUARD','CAREFLIGHT','MERCY','ANGEL','GUARDIAN','HOSP','DUSTOFF','PEDRO','ORNGE','CALSTAR','STAT','AIRAMB','MEDSTAR','AIRAMBULANCE'];

  'B3':'rescue',      // Parachutist / skydiver

  'C1':'government',  // Surface emergency vehicle
  'C2':'government',  // Surface service vehicle

function isUFO(a) {
  const hex = (a.hex||'').toLowerCase();
  const cs  = (a.flight||'').trim();
  const alt = typeof a.alt_baro === 'number' ? a.alt_baro : 0;
  const spd = a.gs || 0;
  const cat = a.category || '';
  // Non-ICAO address (starts with ~) = ghost / TIS-B rebroadcast
  if(hex.startsWith('~')) return true;
  // All-zeros ICAO = invalid/spoofed transponder
  if(hex==='000000' || hex==='ffffff') return true;
  // Physically impossible for category (spoofed or anomalous)
  if(cat==='A1' && spd > 600) return true;   // Light aircraft > 600kts
  if(cat==='A1' && alt > 55000) return true;  // Light aircraft > 55,000ft
  if(cat==='B4' && alt > 20000) return true;  // Ultralight > 20,000ft
  if(cat==='B6' && alt > 60000) return true;  // Drone > 60,000ft
  // ADSBx "interesting" flag (bit 1 of dbFlags)
  if((a.dbFlags||0) & 2) return true;
  return false;
}

function isAlert(a) {
  const sqk = a.squawk || '';
  const emerg = a.emergency || 'none';
  if(['7500','7600','7700'].includes(sqk)) return true;
  if(emerg !== 'none' && emerg !== '' && emerg !== 'reserved') return true;
  // Abnormal altitude indications
  if(typeof a.alt_baro === 'number' && a.alt_baro < -1000) return true;
  return false;
}

function classify(a){
  const hex=(a.hex||'').toLowerCase(), cs=(a.flight||'').trim().toUpperCase(), t=(a.t||'').toUpperCase();
  const cat=(a.category||'');

  // Emergency/alert always takes top priority
  if(isAlert(a)) return 'alert';

  // UFO / anomalous / unidentified
  if(isUFO(a)) return 'ufo';

  // Special ADS-B emitter categories
  if(EMITTER_SPECIAL[cat]) return EMITTER_SPECIAL[cat];

  // Intel / military
  if(INTEL_DB[hex]) return 'intel';
  for(const p of INTEL_CS_PFX) if(cs.startsWith(p)) return 'intel';
  if(SIGINT_TYPES.has(t)&&(a.dbFlags||0)&1) return 'intel';
  if((a.dbFlags||0)&1) return 'military';

  if(!cs) return 'unknown';
  for(const p of RESCUE_PFX) if(cs.startsWith(p)) return 'rescue';
  for(const p of GOVT_PFX)   if(cs.startsWith(p)) return 'government';
  for(const p of MIL_PFX)    if(cs.startsWith(p)) return 'military';
  const p3=cs.slice(0,3),p2=cs.slice(0,2);
  if(AL3.has(p3)&&/\d/.test(cs[3]||'')) return 'commercial';
  if(AL2.has(p2)&&/\d/.test(cs[2]||'')) return 'commercial';
  if(/^[A-Z]{1,2}-[A-Z]{2,5}$/.test(cs)||/^N\d{1,5}[A-Z]{0,2}$/.test(cs)) return 'private';
  const reg=(a.r||'').toUpperCase();
  if(/^[A-Z]{1,2}-[A-Z]{2,5}$/.test(reg)||/^N\d+/.test(reg)) return 'private';
  return 'unknown';
}

function classifyVessel(typeCode){
  const t = parseInt(typeCode)||0;

  if(t>=20&&t<=28)                   return {cat:'special',    label:'Wing-in-ground craft',  icon:'🛥'};

  if(t===31||t===32)                 return {cat:'towing',     label:'Towing vessel',         icon:'⛵'};
  if(t===33||t===34)                 return {cat:'special',    label:'Dredging / underwater', icon:'🔧'};
  if(t===35)                         return {cat:'military',   label:'Military vessel',       icon:'⚔'};
  if(t===36)                         return {cat:'sail',       label:'Sailing vessel',        icon:'⛵'};
  if(t===37)                         return {cat:'pleasure',   label:'Pleasure craft',        icon:'🛥'};
  if(t>=40&&t<=49)                   return {cat:'highspeed',  label:'High-speed craft',      icon:'💨'};
  if(t===50)                         return {cat:'pilot',      label:'Pilot vessel',          icon:'🧭'};
  if(t===51)                         return {cat:'rescue',     label:'Search and rescue vessel',icon:'🚑'};
  if(t===52)                         return {cat:'towing',     label:'Tug',                   icon:'⛽'};
  if(t===53)                         return {cat:'port',       label:'Port tender',           icon:'🚤'};
  if(t===55)                         return {cat:'government', label:'Law enforcement',       icon:'🏛'};
  if(t===57||t===58)                 return {cat:'government', label:'Medical / hospital',    icon:'🚑'};
  if(t>=60&&t<=69)                   return {cat:'passenger',  label:'Passenger vessel',      icon:'👥'};
  if(t>=70&&t<=79)                   return {cat:'cargo',      label:'Cargo vessel',          icon:'📦'};
  if(t>=80&&t<=89)                   return {cat:'tanker',     label:'Tanker',                icon:'🛢'};
  if(t>=90&&t<=99)                   return {cat:'other',      label:'Other vessel type',     icon:'🚢'};
  return                                     {cat:'unknown',   label:'Unknown vessel',        icon:'🚢'};
}

const PROXIES=[

  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,

];
const API_BASES=[
  {name:'adsb.lol',       base:'https://api.adsb.lol'},
  {name:'adsb.one',       base:'https://api.adsb.one'},

async function _rawFetch(url,label,ms){
  const ctrl=new AbortController(),tid=setTimeout(()=>ctrl.abort(),ms||10000);
  try{
    const res=await fetch(url,{signal:ctrl.signal});
    clearTimeout(tid);
    if(!res.ok){vlog('warn',`${label} → HTTP ${res.status}`);return null;}
    const j=await res.json();
    if(j&&Array.isArray(j.ac)){vlog('ok',`${label} → ${j.ac.length} aircraft`);return j;}
    if(j&&j.contents){try{const i=JSON.parse(j.contents);if(i&&Array.isArray(i.ac))return i;}catch(e){}}
    vlog('warn',`${label} → no aircraft array`);return null;
  }catch(e){clearTimeout(tid);vlog('warn',`${label} → ${e.name==='AbortError'?'timeout':e.message}`);return null;}
}

async function probeApis(){
  const c=map.getCenter(),lat=c.lat.toFixed(2),lon=c.lng.toFixed(2);
  vlog('info',`Probing APIs lat=${lat} lon=${lon}`);
  for(const src of API_BASES){
    const direct=`${src.base}/v2/lat/${lat}/lon/${lon}/dist/50`;
    // Direct probe — 5s timeout (was 2s, too short for CDN cold start)
    const d=await _rawFetch(direct,src.name+' direct',5000);
    if(d!==null){workingApi={...src,useProxy:false};vlog('ok',`Working: ${src.name} direct`);return workingApi;}
    // Proxy attempts — 8s each
    for(let i=0;i<PROXIES.length;i++){
      const r=await _rawFetch(PROXIES[i](direct),`${src.name} proxy${i+1}`,8000);
      if(r!==null){workingApi={...src,useProxy:true,proxyIdx:i};vlog('ok',`Working: ${src.name} proxy${i+1}`);return workingApi;}
    }
  }
  vlog('error','All APIs failed');return null;
}

function buildUrl(lat,lon,dist){
  const direct=`${workingApi.base}/v2/lat/${lat}/lon/${lon}/dist/${dist}`;
  return workingApi.useProxy?PROXIES[workingApi.proxyIdx||0](direct):direct;
}

const QUERY_NM=250,QUERY_KM=QUERY_NM*1.852,QUERY_DEG=QUERY_KM/111;
function getViewportTiles(){
  const b=map.getBounds().pad(0.05);
  const minLat=Math.max(b.getSouth(),-85),maxLat=Math.min(b.getNorth(),85);
  const minLon=b.getWest(),maxLon=b.getEast();
  const step=QUERY_DEG*1.6,tiles=[];
  for(let lat=minLat+step/2;lat<maxLat+step/2;lat+=step){
    const cl=Math.max(minLat,Math.min(maxLat,lat));
    const lonStep=step/Math.max(0.1,Math.cos(cl*Math.PI/180));
    for(let lon=minLon+lonStep/2;lon<maxLon+lonStep/2;lon+=lonStep){
      tiles.push({lat:cl.toFixed(3),lon:Math.max(minLon,Math.min(maxLon,lon)).toFixed(3)});
    }
  }
  const c=map.getCenter();tiles.unshift({lat:c.lat.toFixed(3),lon:c.lng.toFixed(3)});
  vlog('info',`Viewport ${(maxLat-minLat).toFixed(1)}°×${(maxLon-minLon).toFixed(1)}° → ${tiles.length} tile(s)`);
  return tiles;
}

/* ═══ PARSE ════════════════════════════════════════════════════ */
function parseV2(ac){
  return ac.filter(a=>a.lat!=null&&a.lon!=null&&a.alt_baro!=='ground'&&a.alt_baro!=null)
    .map(a=>{
      const ft=typeof a.alt_baro==='number'?Math.round(a.alt_baro):null;
      return{id:(a.flight||a.r||a.hex||'?').trim(),hex:a.hex||'—',reg:a.r||'—',type:a.t||'—',
        country:a.ownOp||'—',lat:a.lat,lng:a.lon,alt:ft,
        spd:a.gs?Math.round(a.gs):null,hdg:a.track?Math.round(a.track):0,
        vrate:a.baro_rate||0,sqk:a.squawk||'—',emergency:a.emergency||'none',
        dbFlags:a.dbFlags||0,raw_cat:a.category||'',phase:flightPhase(ft,a.baro_rate||0,EMITTER_SPECIAL[a.category||'']||''),category:classify(a)};
    });
}

/* ═══ MAIN FETCH ═══════════════════════════════════════════════ */
async function fetchViewport(manual){
  if(isFetching&&!manual)return;
  isFetching=true;ring(true);
  if(manual)document.getElementById('rbtn').classList.add('spin');
  setStatus('load','Loading…');
  if(!workingApi){vlog('info','Probing APIs…');await probeApis();}
  if(!workingApi){
    if(Object.keys(flightMap).length===0)loadDemo();
    setStatus('err','All APIs unreachable — showing demo data');
    document.getElementById('srcbadge').textContent='demo';
    isFetching=false;ring(false);document.getElementById('rbtn').classList.remove('spin');
    renderMap();return;
  }
  const tiles=getViewportTiles();
  setStatus('load',`Fetching ${tiles.length} area(s)…`);
  const results=await Promise.all(tiles.map(t=>_rawFetch(buildUrl(t.lat,t.lon,QUERY_NM),`${workingApi.name}[${t.lat},${t.lon}]`,10000)));
  const seen=new Set(),allAc=[];let tileCount=0;
  results.forEach(j=>{if(!j)return;tileCount++;(j.ac||[]).forEach(a=>{if(a.hex&&!seen.has(a.hex)){seen.add(a.hex);allAc.push(a);}});});
  if(tileCount>0){
    const fresh=parseV2(allAc),freshSet=new Set(fresh.map(f=>f.hex));
    fresh.forEach(f=>{flightMap[f.hex]=f;});
    const bounds=map.getBounds().pad(0.3);let pruned=0;
    Object.keys(flightMap).forEach(hex=>{const f=flightMap[hex];if(!freshSet.has(hex)&&!bounds.contains([f.lat,f.lng])){delete flightMap[hex];pruned++;}});
    const pLabel=workingApi.useProxy?` proxy${(workingApi.proxyIdx||0)+1}`:' direct';
    document.getElementById('srcbadge').textContent=`${workingApi.name}${pLabel} · ${tiles.length}×250nm`;
    setStatus('ok',`${fresh.length} in view · ${Object.keys(flightMap).length} tracked · ${new Date().toLocaleTimeString()}`);
    vlog('ok',`${allAc.length} raw → ${fresh.length} airborne from ${tileCount}/${tiles.length} tiles`);
  }else{workingApi=null;setStatus('err','Fetch failed — will re-probe');}
  isFetching=false;ring(false);document.getElementById('rbtn').classList.remove('spin');
  renderMap();
}

/* ═══ FILTER + SEARCH ══════════════════════════════════════════ */
function allList(){return Object.values(flightMap);}
function filtered(){
  let d=activeFilter==='all'?allList():allList().filter(f=>f.category===activeFilter);
  if(query){const q=query.toUpperCase();d=d.filter(f=>f.id.toUpperCase().includes(q)||f.hex.includes(q)||f.type.toUpperCase().includes(q)||f.reg.toUpperCase().includes(q)||f.country.toUpperCase().includes(q));}
  return d;
}
function setFilter(cat,el){
  activeFilter=cat;
  document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  if(selected){
    const f=Object.values(flightMap).find(x=>x.id===selected);
    if(f&&cat!=='all'&&f.category!==cat)deselect(true);
  }
  renderMap();
  // Zoom to bounds of filtered aircraft (if not 'all' and enough planes visible)
  if(cat!=='all'){
    const vis=filtered();
    if(vis.length>0 && vis.length<=500){
      if(vis.length===1){
        map.flyTo([vis[0].lat,vis[0].lng],8,{duration:1.0,easeLinearity:.5});
      } else {
        const bounds=L.latLngBounds(vis.map(f=>[f.lat,f.lng]));
        map.flyToBounds(bounds.pad(0.15),{maxZoom:9,duration:1.2,easeLinearity:.5});
      }
    }
  }
}
function onSearch(){query=document.getElementById('search').value.trim();renderMap();}

/* ═══ RENDER MAP ═══════════════════════════════════════════════ */
function renderMap(){
  if(activeDomain !== 'air') return;   // never render air markers in other domains
  const vis=filtered(),visSet=new Set(vis.map(f=>f.hex));
  Object.keys(markers).forEach(hex=>{
    const keep=flightMap[hex]&&(visSet.has(hex)||(selected&&flightMap[hex]?.id===selected));
    if(!keep){map.removeLayer(markers[hex]);delete markers[hex];}
  });
  document.getElementById('pill').textContent=vis.length.toLocaleString()+' aircraft';
  document.getElementById('fab').className=selected?'on':'';
  const toRender=selected?[...vis,...allList().filter(f=>f.id===selected&&!visSet.has(f.hex))]:vis;
  toRender.forEach(f=>{
    const sel=selected===f.id,dimmed=!!selected&&!sel;
    const color=sel?'#ffffff':(dimmed?'#252840':(CAT[f.category]||CAT.unknown).color);
    const sz=sel?26:(dimmed?14:20),op=dimmed?0.15:1;
    if(markers[f.hex]){markers[f.hex].setLatLng([f.lat,f.lng]);markers[f.hex].setIcon(planeIcon(f.hdg,color,sz,op));}
    else{
      const m=L.marker([f.lat,f.lng],{icon:planeIcon(f.hdg,color,sz,op),zIndexOffset:sel?2000:(dimmed?-200:0)});
      m.on('click',()=>selectFlight(f.id));m.addTo(map);markers[f.hex]=m;
    }
    markers[f.hex].unbindTooltip();
    if(!dimmed||sel){
      const intel=INTEL_DB[(f.hex||'').toLowerCase()];
      markers[f.hex].bindTooltip(
        `<b>${f.id}</b>${intel?' · 🔵 '+intel.agency:''}<br>${typeName(f.type)}<br>${f.alt?f.alt.toLocaleString()+' ft':'—'} · ${f.spd?f.spd+' kts':'—'}`,
        {direction:'top',offset:[0,-8]}
      );
    }
  });
}

/* ═══ ROUTE ON MAP ═════════════════════════════════════════════ */
let routeLayer=null;
function clearRoute(){if(routeLayer){map.removeLayer(routeLayer);routeLayer=null;}}
function drawRoute(f,route){
  clearRoute();if(!route)return;
  const o=route.origin,d=route.destination,m=route.midpoint;
  const pts=[[o.latitude,o.longitude]];
  if(m)pts.push([m.latitude,m.longitude]);
  pts.push([f.lat,f.lng]);
  pts.push([d.latitude,d.longitude]);
  const color=(CAT[f.category]||CAT.unknown).color;
  routeLayer=L.layerGroup();
  L.polyline(pts,{color,weight:2,opacity:0.75,dashArray:'7,5'}).addTo(routeLayer);
  L.circleMarker([o.latitude,o.longitude],{radius:6,color,fillColor:color,fillOpacity:1,weight:2})
    .bindTooltip(`<b>🛫 ${o.iata_code||o.icao_code}</b><br>${o.name}<br>${o.municipality}, ${o.country_name}`,{direction:'top'}).addTo(routeLayer);
  L.circleMarker([d.latitude,d.longitude],{radius:6,color:'#fff',fillColor:'#fff',fillOpacity:1,weight:2})
    .bindTooltip(`<b>🛬 ${d.iata_code||d.icao_code}</b><br>${d.name}<br>${d.municipality}, ${d.country_name}`,{direction:'top'}).addTo(routeLayer);
  if(m)L.circleMarker([m.latitude,m.longitude],{radius:4,color,fillColor:color,fillOpacity:0.6,weight:1.5})
    .bindTooltip(`<b>⏩ ${m.iata_code||m.icao_code}</b><br>${m.name}`,{direction:'top'}).addTo(routeLayer);
  routeLayer.addTo(map);
}
/* ── VESSEL ICON ─────────────────────────────────────────────── */
function vesselIcon(hdg, color, sz, op){
  const s = sz||18;
  // Top-down ship silhouette: pointed bow (top), wider stern (bottom)
  return L.divIcon({
    html:`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 32 40"
      style="transform:rotate(${hdg||0}deg);opacity:${op||1};display:block;overflow:visible">
      <g fill="${color}" stroke="#0a0c14" stroke-width="1.3" stroke-linejoin="round">
        <!-- Hull: pointed bow at top, wide stern at bottom -->
        <path d="M16,2 L26,12 L24,36 L8,36 L6,12 Z"/>
        <!-- Superstructure/bridge -->
        <rect x="12" y="14" width="8" height="8" rx="1.5"/>
      </g></svg>`,
    className:'', iconSize:[s,s], iconAnchor:[s/2, s*0.6]
  });
}

function haverDist(a1,o1,a2,o2){
  const R=3440.1,dA=(a2-a1)*Math.PI/180,dO=(o2-o1)*Math.PI/180;
  return 2*R*Math.atan2(Math.sqrt(Math.sin(dA/2)**2+Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dO/2)**2),Math.sqrt(1-Math.sin(dA/2)**2-Math.cos(a1*Math.PI/180)*Math.cos(a2*Math.PI/180)*Math.sin(dO/2)**2));
}

/* ═══ ENRICHMENT ═══════════════════════════════════════════════ */
async function enrichAircraft(hex,callsign){
  if(!hex||hex==='—')return;
  if(acCache[hex]&&acCache[hex]._done)return;
  acCache[hex]={_done:false};
  vlog('info',`Enriching ${hex} / ${callsign||'?'}`);
  try{
    const infoUrl=PROXIES[0]('https://hexdb.io/api/v1/aircraft/'+hex);
    const imgUrl=PROXIES[0]('https://hexdb.io/hex-image-thumb?hex='+hex);
    const [ir,imgr]=await Promise.all([fetch(infoUrl).catch(()=>null),fetch(imgUrl).catch(()=>null)]);
    if(ir&&ir.ok){
      const d=await ir.json();
      Object.assign(acCache[hex],{typeFull:d.Type||'',manufacturer:d.Manufacturer||'',owner:d.RegisteredOwners||'',reg:d.Registration||'',operator:d.OperatorFlagCode||''});
      vlog('ok',`  hexdb: ${d.Type} / ${d.RegisteredOwners}`);
    }else vlog('warn','  hexdb info failed');
    if(imgr&&imgr.ok){const b=await imgr.blob();if(b.size>500){acCache[hex].photoUrl=URL.createObjectURL(b);vlog('ok','  Photo loaded');}}
  }catch(e){vlog('error','  hexdb: '+e.message);}
  if(callsign&&callsign.trim()&&callsign!=='?'){
    try{
      const cs=callsign.trim().toUpperCase();
      const rUrl=PROXIES[0]('https://api.adsbdb.com/v0/callsign/'+cs);
      vlog('info','  adsbdb route for '+cs);
      const rr=await fetch(rUrl);
      if(rr.ok){
        const rj=await rr.json();
        const fr=rj?.response?.flightroute;
        if(fr&&fr.origin&&fr.destination){
          acCache[hex].route={origin:fr.origin,destination:fr.destination,midpoint:fr.midpoint||null,airline:fr.airline||null};
          vlog('ok',`  Route: ${fr.origin.icao_code} → ${fr.destination.icao_code}`);
        }else vlog('warn','  adsbdb: no route for '+cs);
      }else vlog('warn','  adsbdb HTTP '+rr.status);
    }catch(e){vlog('error','  adsbdb: '+e.message);}
  }
  acCache[hex]._done=true;
}

/* ═══ SELECT / DESELECT ════════════════════════════════════════ */
async function selectFlight(id){
  if(selected===id){deselect();return;}
  clearRoute();selected=id;renderMap();
  const f=allList().find(x=>x.id===id);if(!f)return;
  renderDetail(f);
  map.flyTo([f.lat,f.lng],7,{duration:1.0,easeLinearity:.5});
  await enrichAircraft(f.hex,f.id);
  if(selected===id){
    renderDetail(f);
    const c=acCache[f.hex]||{};
    if(c.route)drawRoute(f,c.route);
  }
}
function deselect(silent){
  selected=null;clearRoute();
  document.getElementById('detail').classList.remove('on');
  document.getElementById('fab').className='';
  renderMap();
  if(!silent)fetchViewport(false);
}

/* ═══ DETAIL PANEL ═════════════════════════════════════════════ */
function renderDetail(f){
  if(!f)return;
  const cat   = CAT[f.category]||CAT.unknown;
  const intel = INTEL_DB[(f.hex||'').toLowerCase()];
  const sqSt  = squawkStatus(f.sqk,f.emergency);
  const c     = acCache[f.hex]||{};

  // Resolved values — no abbreviations anywhere
  const aircraftType  = c.typeFull || typeName(f.type);
  const manufacturer  = c.manufacturer || '';
  const registration  = (c.reg||f.reg||'—').trim();
  const icao24        = (f.hex||'—').toLowerCase();
  const owner         = c.owner || '';
  const operatorCode  = c.operator || '';
  const route         = c.route || null;
  const airline       = route?.airline || null;
  const operatorName  = airline?.name
    ? `${airline.name}${airline.iata ? ' ('+airline.iata+')' : ''}`
    : operatorCode || f.country || '—';
  const ownerName     = owner || f.country || '—';
  const photoUrl      = c.photoUrl;

  // Flight phase — remove slash, write it out
  const phase = f.phase || '—';
  const altitude = f.alt ? f.alt.toLocaleString()+' ft' : '—';
  const speed    = f.spd ? f.spd+' knots' : '—';
  const heading  = f.hdg ? f.hdg+'°' : '—';
  const vrate    = f.vrate ? (f.vrate>0?'+ ':'')+Math.round(Math.abs(f.vrate))+' ft/min '+(f.vrate>0?'climbing':'descending') : '— ft/min';

  let html = '';

  // ── Status row ──────────────────────────────────────────────
  const catIcon = CAT_ICON[f.category]||'●';
  const isUFOflight  = f.category === 'ufo';
  const isAlertflight = f.category === 'alert';
  const isSpecialflight = ['drone','balloon','ultralight','glider','special'].includes(f.category);
  const emitCatLabel = {
    B1:'Glider / Sailplane', B2:'Balloon or Airship', B3:'Parachutist / Skydiver',
    B4:'Ultralight / Hang-glider / Paraglider', B6:'Unmanned Aerial Vehicle (Drone)',
    B7:'Space / Trans-atmospheric Vehicle', C1:'Surface Emergency Vehicle',
    C2:'Surface Service Vehicle', C3:'Tethered Balloon / Obstacle',
  };
  const emitLabel = emitCatLabel[f.raw_cat||''] || '';
  html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <span class="${sqSt.cls}">${sqSt.label}</span>
    ${intel ? `<span class="intel-tag">🔵 ${intel.agency} — ${intel.country}</span>` : ''}
    ${isUFOflight ? `<span style="background:#1a2000;border:1px solid #607010;border-radius:8px;padding:3px 10px;font-size:11px;color:#c8ff40;font-weight:600">⚠ Unidentified / Anomalous signal</span>` : ''}
    ${isAlertflight ? `<span style="background:#200404;border:1px solid #a01010;border-radius:8px;padding:3px 10px;font-size:11px;color:#ff4040;font-weight:600;animation:pulse .8s infinite">🚨 Active emergency or alert</span>` : ''}
    ${emitLabel ? `<span style="background:#001818;border:1px solid #006050;border-radius:8px;padding:3px 10px;font-size:11px;color:#00e8c8">${emitLabel}</span>` : ''}
  </div>`;

  // ── Header: callsign + type + close ─────────────────────────
  html += `<div class="d-header">
    <div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="d-callsign">${f.id}</span>

      </div>
      <div class="d-subtitle">${aircraftType}${manufacturer ? ' · ' + manufacturer : ''}</div>
    </div>
    <button class="d-close" onclick="deselect()">✕</button>
  </div>`;

  // ── Two-column: photo + identity fields ─────────────────────

    html += `<img class="d-photo" src="${photoUrl}" alt="${aircraftType}"/>`;
  } else {
    html += `<div class="d-photo-ph">✈</div>`;
  }
  html += `<div class="d-fields">
    <div class="d-field">
      <div class="d-label">Registration</div>
      <div class="d-value mono">${registration}</div>
    </div>
    <div class="d-field">
      <div class="d-label">ICAO 24-bit address</div>
      <div class="d-value mono">${icao24}</div>
    </div>
    <div class="d-field">
      <div class="d-label">Registered owner</div>

      <div class="d-label">Operator / Airline</div>

    </div>
  </div></div>`;

  // ── Route bar ─────────────────────────────────────────────
  if(route){
    const o=route.origin,d=route.destination;
    let pct='';
    try{
      const tot=haverDist(o.latitude,o.longitude,d.latitude,d.longitude);
      const fln=haverDist(o.latitude,o.longitude,f.lat,f.lng);
      pct=Math.max(0,Math.min(100,Math.round(fln/tot*100)))+'% flown · '+Math.round(tot)+' nm total';

  // ── Flight stats grid ──────────────────────────────────────
  html += `<div class="d-stats">
    <div class="d-stat">
      <div class="d-stat-label">Altitude</div>
      <div class="d-stat-value">${altitude}</div>
    </div>
    <div class="d-stat">

    <div class="d-stat">
      <div class="d-stat-label">True heading</div>
      <div class="d-stat-value">${heading}</div>
    </div>
    <div class="d-stat">
      <div class="d-stat-label">Vertical rate</div>
      <div class="d-stat-value" style="font-size:11px">${vrate}</div>
    </div>
    <div class="d-stat">
      <div class="d-stat-label">Flight phase</div>
      <div class="d-stat-value" style="font-size:11px">${phase}</div>
    </div>
    <div class="d-stat">
      <div class="d-stat-label">Squawk code</div>
      <div class="d-stat-value mono">${f.sqk}</div>
    </div>
  </div>`;

  // Intel note if applicable
  if(intel){
    html += `<div style="font-size:10px;color:#e060e8;margin-top:6px;padding:5px 10px;background:#160820;border:1px solid #700880;border-radius:6px">
      🔵 <b>${intel.agency}</b> · ${intel.country} — ${intel.note}
    </div>`;
  }

  // UFO explanation
  if(isUFOflight){
    const reasons = [];
    if((f.hex||'').startsWith('~')) reasons.push('Non-ICAO address (TIS-B ghost rebroadcast)');
    if(f.hex==='000000') reasons.push('Invalid all-zero ICAO24 transponder code');
    if(f.hex==='ffffff') reasons.push('Invalid all-ones ICAO24 transponder code');
    if((f.dbFlags||0)&2) reasons.push('Flagged as "interesting" by ADS-B Exchange database');
    if(f.raw_cat==='A1' && (f.spd||0)>600) reasons.push(`Speed anomaly: ${f.spd} knots reported for a light aircraft category`);
    if(f.raw_cat==='A1' && (f.alt||0)>55000) reasons.push(`Altitude anomaly: ${(f.alt||0).toLocaleString()} ft reported for a light aircraft category`);
    html += `<div style="font-size:11px;color:#c8ff40;margin-top:6px;padding:8px 10px;background:#101800;border:1px solid #507010;border-radius:6px;line-height:1.6">
      ⚠ <b>Unidentified / Anomalous</b> — This contact cannot be positively identified or its data contains physical anomalies.<br>
      ${reasons.length ? '<b>Reasons:</b> '+reasons.join(' · ') : 'Signal does not match any known aircraft or operator.'}
    </div>`;
  }

  // Alert explanation
  if(isAlertflight){
    const why = [];
    if(f.sqk==='7500') why.push('Squawk 7500 — Hijack declared');
    if(f.sqk==='7600') why.push('Squawk 7600 — Radio communications failure');
    if(f.sqk==='7700') why.push('Squawk 7700 — General emergency');
    const emerg = f.emergency||'none';
    if(emerg!=='none'&&emerg!=='reserved'){
      const emDict={general:'General emergency',lifeguard:'Medical / lifeguard flight',minfuel:'Minimum fuel',nordo:'No radio (NORDO)',unlawful:'Unlawful interference (hijack)',downed:'Downed aircraft'};
      why.push(emDict[emerg]||'Emergency: '+emerg);
    }
    html += `<div style="font-size:11px;color:#ff4040;margin-top:6px;padding:8px 10px;background:#200404;border:1px solid #a01010;border-radius:6px;line-height:1.6">
      🚨 <b>Active alert</b> — ${why.join(' · ')||'Abnormal status detected'}
    </div>`;
  }

  document.getElementById('detail-inner').innerHTML = html;
  document.getElementById('detail').classList.add('on');
}

/* ═══ LOG — text-file style ═════════════════════════════════ */
const logLines = [];   // array of raw strings, newest first
const LOG_MAX  = 500;  // keep last 500 lines

// Level → prefix used in the text file
const LOG_PREFIX = {
  ok:    'OK   ',
  info:  'INFO ',
  warn:  'WARN ',
  error: 'ERROR',
};

// Level → ANSI-style colour for the pre element
const LOG_COLOR = {
  ok:    '#7dd460',
  info:  '#8090b8',
  warn:  '#e8a040',
  error: '#e85858',
};

function vlog(level, msg){
  const now   = new Date();
  const hh    = String(now.getHours()).padStart(2,'0');
  const mm    = String(now.getMinutes()).padStart(2,'0');
  const ss    = String(now.getSeconds()).padStart(2,'0');
  const ms    = String(now.getMilliseconds()).padStart(3,'0');
  const ts    = `${hh}:${mm}:${ss}.${ms}`;
  const pfx   = LOG_PREFIX[level] || 'DEBUG';
  const line  = `${ts}  ${pfx}  ${msg}`;
  const color = LOG_COLOR[level] || '#8090b8';

  console.log(line);
  logLines.unshift({text: line, color});
  if(logLines.length > LOG_MAX) logLines.length = LOG_MAX;

  // Update DOM if panel is visible — no RAF needed since display:none hides it
  const panel = document.getElementById('logpanel');
  if(panel && panel.classList.contains('visible')){
    _renderLog();
  }
}

function _renderLog(){
  const pre   = document.getElementById('loglines');
  const count = document.getElementById('log-count');
  if(!pre) return;

  // Build a single text block where each line has its own colour
  // Using <span> per line inside <pre> preserves monospace + word layout
  pre.innerHTML = logLines.map(l =>
    `<span style="color:${l.color}">${_escHtml(l.text)}</span>`
  ).join('\n');

  if(count) count.textContent = `${logLines.length} line${logLines.length!==1?'s':''}`;
}

function _escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleLog(){
  const panel = document.getElementById('logpanel');
  const btn   = document.getElementById('logbtn');
  const open  = panel.classList.contains('visible');

  if(open){
    panel.classList.remove('visible');
    btn.style.color       = '#6b6e8a';
    btn.style.borderColor = '#232636';
  } else {
    panel.classList.remove('hidden');
    panel.classList.add('visible');
    btn.style.color       = '#4fa8e8';
    btn.style.borderColor = '#4fa8e8';
    _renderLog();
  }
}

function copyLog(){
  const text = logLines.map(l => l.text).join('\n');
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('log-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.style.color = '#7dd460';
    setTimeout(()=>{ btn.textContent=orig; btn.style.color=''; }, 1500);
  }).catch(()=>{
    // Fallback for browsers without clipboard API
    const ta = document.createElement('textarea');
    ta.value = logLines.map(l => l.text).join('\n');
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
}

function saveLog(){
  const now   = new Date();
  const stamp = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`
              + `_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
  const filename = `vectorwatch_${stamp}.log`;

  // Build file content — header + all log lines (oldest first for readability)
  const header = [
    `VectorWatch — Debug Log`,
    `Exported : ${now.toISOString()}`,
    `Entries  : ${logLines.length}`,
    `URL      : ${location.href}`,
    `Browser  : ${navigator.userAgent}`,
    '─'.repeat(80),
    '',
  ].join('\n');

  const body = [...logLines].reverse().map(l => l.text).join('\n');
  const blob = new Blob([header + body], {type: 'text/plain;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);

  // Visual feedback
  const btn = document.getElementById('log-save');
  if(btn){ const orig=btn.textContent; btn.textContent='✓ Saved'; btn.style.color='#7dd460';
    setTimeout(()=>{ btn.textContent=orig; btn.style.color=''; }, 2000); }
  vlog('info', `Log saved as ${filename} (${logLines.length} entries)`);
}

function clearLog(){
  logLines.length = 0;
  _renderLog();
  vlog('info', 'Log cleared');
}

/* ═══ LOCATE ME ════════════════════════════════════════════════ */
let locateMarker = null;
let locateCircle = null;

function locateMe(){
  const btn = document.getElementById('locbtn');
  btn.textContent = '⏳';
  btn.classList.add('active');
  if(!navigator.geolocation){
    setStatus('err','Geolocation not supported by this browser');
    btn.textContent = '📍'; btn.classList.remove('active'); return;
  }
  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const acc = pos.coords.accuracy; // metres
      vlog('ok', `Location: ${lat.toFixed(4)}, ${lng.toFixed(4)} ± ${Math.round(acc)}m`);

      // Remove old markers
      if(locateMarker){ map.removeLayer(locateMarker); locateMarker=null; }
      if(locateCircle){ map.removeLayer(locateCircle); locateCircle=null; }

      // Accuracy circle
      locateCircle = L.circle([lat,lng],{
        radius: acc, color:'#4fa8e8', fillColor:'#4fa8e8',
        fillOpacity:0.08, weight:1.5, dashArray:'4,3'
      }).addTo(map);

      // You-are-here pin
      const youIcon = L.divIcon({
        html:`<div style="width:14px;height:14px;border-radius:50%;background:#4fa8e8;border:3px solid #fff;box-shadow:0 0 0 2px #4fa8e8,0 0 12px rgba(79,168,232,.6)"></div>`,
        className:'', iconSize:[14,14], iconAnchor:[7,7]
      });
      locateMarker = L.marker([lat,lng],{icon:youIcon,zIndexOffset:3000})
        .bindTooltip(`<b>You are here</b><br>${lat.toFixed(5)}, ${lng.toFixed(5)}<br>Accuracy ± ${Math.round(acc)} m`,
          {direction:'top', permanent:false})
        .addTo(map);

      // Fly to location at zoom 10
      map.flyTo([lat,lng], 10, {duration:1.2, easeLinearity:.5});
      btn.textContent = '📍'; btn.classList.remove('active');
      setStatus('ok', `Located: ${lat.toFixed(4)}, ${lng.toFixed(4)} ± ${Math.round(acc)}m`);
    },
    err => {
      vlog('error', 'Geolocation error: '+err.message);
      setStatus('err', 'Location access denied or unavailable');
      btn.textContent = '📍'; btn.classList.remove('active');
    },
    {enableHighAccuracy:true, timeout:10000, maximumAge:30000}
  );
}

/* ═══ DOMAIN SWITCHER ════════════════════════════════════════ */
function setDomain(domain, el){
  if(activeDomain === domain) return;
  const prev = activeDomain;

  // ── 1. STOP all running sources ────────────────────────────
  clearInterval(autoTimer); autoTimer=null;   // air auto-refresh
  if(aisSocket){ aisSocket.close(); aisSocket=null; } // sea WebSocket
  if(landTimer){ clearInterval(landTimer); landTimer=null; } // land poll
  clearTimeout(window._landMoveTimer);
  map.off('moveend.land'); map.off('zoomend.land');  // land move listeners

  // ── 2. PURGE all markers + data from ALL domains ───────────
  hideAirCoverage();
  hideSeaCoverage();
  hideLandCoverage();
  hideCoveragePanel();
  Object.values(markers).forEach(m=>map.removeLayer(m));
  Object.values(vesselMarkers).forEach(m=>map.removeLayer(m));
  Object.values(landMarkers).forEach(m=>map.removeLayer(m));
  markers={}; flightMap={};
  vesselMarkers={}; vesselMap={};
  landMarkers={}; landMap={};
  clearRoute();

  // ── 3. Reset UI ────────────────────────────────────────────
  activeDomain = domain;   // SET AFTER cleanup so guards don't fire prematurely
  selected=null;
  document.getElementById('detail').classList.remove('on');
  document.getElementById('fab').className='';
  document.getElementById('pill').textContent='—';
  document.getElementById('srcbadge').textContent='—';
  document.getElementById('land-bar').style.display='none';
  document.querySelectorAll('.dtab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');

  vlog('info', `Domain: ${prev} → ${domain}`);

  // ── 4. START new domain ────────────────────────────────────
  if(domain==='air'){
    showAirCoverage(); showCoveragePanel('air');
    fetchViewport(true);
  } else if(domain==='sea'){
    showSeaCoverage(); showCoveragePanel('sea');
    startSeaStream();
  } else if(domain==='land'){
    document.getElementById('land-bar').style.display='flex';
    showLandCoverage(); showCoveragePanel('land');
    startLandPoll();
  }
}

/* ═══ SEA / AIS STREAM ════════════════════════════════════════
   aisstream.io — free WebSocket AIS, global, no proxy needed
   Free API key required: https://aisstream.io (sign up free)
   Falls back to demo data if no key / connection fails
══════════════════════════════════════════════════════════════ */
const AISSTREAM_KEY = '35edfaad9acb852a84064009604a05bccb912dac'; // aisstream.io

function sendAISSubscription(){
  if(!aisSocket || aisSocket.readyState !== WebSocket.OPEN) return;
  const sub = {
    APIKey: AISSTREAM_KEY,
    BoundingBoxes: [getBoundingBox()],
    FilterMessageTypes: ['PositionReport','ShipStaticData'],
  };
  aisSocket.send(JSON.stringify(sub));
  vlog('info',`AIS subscribed: bbox ${JSON.stringify(getBoundingBox())}`);
}

function getBoundingBox(){
  const b = map.getBounds().pad(0.05);
  return [[b.getSouth(), b.getWest()],[b.getNorth(), b.getEast()]];
}

function startSeaStream(){
  // Note: setDomain already closed any existing socket before calling this
  if(!AISSTREAM_KEY){
    vlog('warn','No AISstream key — showing sea demo data. Get a free key at aisstream.io');
    setStatus('load','Sea demo mode — add AISSTREAM_KEY for live data');
    document.getElementById('srcbadge').textContent='sea · demo';
    loadSeaDemo();
    renderSea();
    return;
  }
  vlog('info','Connecting to aisstream.io WebSocket…');
  setStatus('load','Connecting to AIS stream…');
  // Show demo data immediately — replaced by live data when WS messages arrive
  loadSeaDemo(); renderSea();

  try {
    aisSocket = new WebSocket('wss://stream.aisstream.io/v0/stream');
    aisSocket.onopen = () => {
      vlog('ok','AIS WebSocket connected');
      sendAISSubscription();
      setStatus('ok','AIS stream connected · '+new Date().toLocaleTimeString());
      document.getElementById('srcbadge').textContent='aisstream.io · live';
      // Re-subscribe when user pans/zooms to cover new area
      map.on('moveend.sea zoomend.sea', ()=>{
        if(activeDomain==='sea' && aisSocket && aisSocket.readyState===WebSocket.OPEN){
          vlog('info','Sea viewport changed — re-subscribing AIS');
          sendAISSubscription();
        }
      });
    };
    aisSocket.onmessage = (evt) => {
      try {
        const msg = JSON.parse(evt.data);
        handleAISMessage(msg);
      } catch(e){ /* ignore parse errors */ }
    };
    aisSocket.onerror = (e) => {
      vlog('error','AIS WebSocket error — showing demo sea data');
      if(activeDomain==='sea'){
        setStatus('err','AIS stream error — showing demo data');
        if(Object.keys(vesselMap).length===0){ loadSeaDemo(); renderSea(); }
      }
    };
    aisSocket.onclose = () => {
      vlog('warn','AIS WebSocket closed');
      if(activeDomain==='sea'){
        setStatus('err','AIS stream disconnected — showing demo data');
        if(Object.keys(vesselMap).length===0){ loadSeaDemo(); renderSea(); }
      }
    };
  } catch(e) {
    vlog('error','WebSocket failed: '+e.message);
    loadSeaDemo(); renderSea();
  }
}

function stopSeaStream(){
  map.off('moveend.sea'); map.off('zoomend.sea');
  if(aisSocket){ aisSocket.close(); aisSocket=null; }
}

function handleAISMessage(msg){
  const meta    = msg.MetaData || {};
  const msgType = msg.MessageType || '';
  const mmsi    = String(meta.MMSI || msg.Message?.PositionReport?.UserID || '');
  if(!mmsi) return;

  if(!vesselMap[mmsi]) vesselMap[mmsi]={mmsi};

  if(msgType==='PositionReport'){
    const p = msg.Message?.PositionReport || {};
    Object.assign(vesselMap[mmsi],{
      lat:    meta.latitude  || p.Latitude,
      lng:    meta.longitude || p.Longitude,
      sog:    p.Sog || 0,          // speed over ground (knots)
      cog:    p.Cog || 0,          // course over ground
      hdg:    p.TrueHeading < 511 ? p.TrueHeading : (p.Cog||0),
      navstat:p.NavigationalStatus,
      name:   meta.ShipName || vesselMap[mmsi].name || '—',
    });
    if(vesselMap[mmsi].lat && activeDomain==='sea') renderVessel(mmsi);
  }
  if(msgType==='ShipStaticData'){
    const s = msg.Message?.ShipStaticData || {};
    Object.assign(vesselMap[mmsi],{
      name:     s.Name?.trim() || vesselMap[mmsi].name || '—',
      callsign: s.CallSign?.trim() || '—',
      typeCode: s.Type || 0,
      dest:     s.Destination?.trim() || '—',
      draught:  s.MaximumStaticDraught || 0,
      imo:      s.ImoNumber || 0,
    });
  }
}

function renderVessel(mmsi){
  if(activeDomain !== 'sea') return;   // never render sea markers in other domains
  const v = vesselMap[mmsi];
  if(!v || v.lat==null) return;
  const tinfo  = classifyVessel(v.typeCode||0);
  const color  = VESSEL_CAT_COLOR[tinfo.cat] || '#6b6e8a';
  const isSel  = selected === mmsi;
  const sz     = isSel ? 26 : 18;
  const op     = isSel ? 1  : 0.9;

  if(vesselMarkers[mmsi]){
    vesselMarkers[mmsi].setLatLng([v.lat,v.lng]);
    vesselMarkers[mmsi].setIcon(vesselIcon(v.hdg||v.cog||0, isSel?'#fff':color, sz, op));
  } else {
    const m = L.marker([v.lat,v.lng],{
      icon:vesselIcon(v.hdg||v.cog||0, color, sz, op),
      zIndexOffset: isSel?2000:0
    });
    m.bindTooltip(
      `<b>${v.name||mmsi}</b><br>${tinfo.icon} ${tinfo.label}<br>`+
      `${v.sog||0} kn · ${NAVSTAT_LABEL[v.navstat]||'—'}`,
      {direction:'top', offset:[0,-8]}
    );
    m.on('click',()=>selectVessel(mmsi));
    m.addTo(map);
    vesselMarkers[mmsi] = m;
  }
}

function renderSea(){
  Object.keys(vesselMap).forEach(mmsi=>renderVessel(mmsi));
  const total = Object.keys(vesselMap).length;
  document.getElementById('pill').textContent = total.toLocaleString()+' vessels';
}

/* ── Select a vessel ────────────────────────────────────────── */
function selectVessel(mmsi){
  if(selected===mmsi){deselectVessel();return;}
  selected=mmsi;
  Object.keys(vesselMarkers).forEach(m=>{
    const v=vesselMap[m];
    const tinfo=classifyVessel(v.typeCode||0);
    const color=VESSEL_CAT_COLOR[tinfo.cat]||'#6b6e8a';
    const isSel=(m===mmsi);
    vesselMarkers[m].setIcon(vesselIcon(v.hdg||v.cog||0,isSel?'#fff':color,isSel?26:18,isSel?1:.5));
    vesselMarkers[m].options.zIndexOffset=isSel?2000:-100;
  });
  document.getElementById('fab').className='on';
  const v=vesselMap[mmsi]; if(!v)return;
  map.flyTo([v.lat,v.lng],8,{duration:1.0,easeLinearity:.5});
  renderVesselDetail(v);
}

function deselectVessel(){
  selected=null;
  document.getElementById('detail').classList.remove('on');
  document.getElementById('fab').className='';
  Object.keys(vesselMarkers).forEach(m=>{
    const v=vesselMap[m];
    const tinfo=classifyVessel(v.typeCode||0);
    const color=VESSEL_CAT_COLOR[tinfo.cat]||'#6b6e8a';
    vesselMarkers[m].setIcon(vesselIcon(v.hdg||v.cog||0,color,18,0.9));
    vesselMarkers[m].options.zIndexOffset=0;
  });
}

/* ── Vessel detail panel ────────────────────────────────────── */
function renderVesselDetail(v){
  const tinfo  = classifyVessel(v.typeCode||0);
  const navlbl = NAVSTAT_LABEL[v.navstat] ?? `Status ${v.navstat}`;
  const color  = VESSEL_CAT_COLOR[tinfo.cat]||'#6b6e8a';
  const isDistress = v.navstat===14;
  const isAground  = v.navstat===6;

  let html='';

  // Status
  if(isDistress)
    html+=`<div style="background:#200404;border:1px solid #a01010;border-radius:8px;padding:4px 10px;font-size:11px;color:#ff4040;font-weight:600;margin-bottom:8px;animation:pulse .8s infinite">🚨 SART / MOB / EPIRB ACTIVE — Distress signal</div>`;
  else if(isAground)
    html+=`<div style="background:#201000;border:1px solid #a04010;border-radius:8px;padding:4px 10px;font-size:11px;color:#e8a040;font-weight:600;margin-bottom:8px">⚠ VESSEL AGROUND</div>`;

  html+=`<div class="d-header">
    <div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <span class="d-callsign">${v.name||v.mmsi}</span>

      </div>
      <div class="d-subtitle">MMSI ${v.mmsi}${v.callsign&&v.callsign!=='—'?' · '+v.callsign:''}</div>
    </div>
    <button class="d-close" onclick="deselectVessel()">✕</button>
  </div>`;

  // Voyage info
  if(v.dest&&v.dest!=='—'&&v.dest!=='')
    html+=`<div style="background:#0d1a0d;border:1px solid #1a3a1a;border-radius:7px;padding:6px 10px;font-size:12px;color:#7dd460;margin-bottom:8px">
      ⚓ Destination: <b>${v.dest}</b>
    </div>`;

  // Stats grid
  html+=`<div class="d-stats">
    <div class="d-stat"><div class="d-stat-label">Speed over ground</div><div class="d-stat-value">${v.sog||0} <span class="d-stat-unit">knots</span></div></div>
    <div class="d-stat"><div class="d-stat-label">Course</div><div class="d-stat-value">${Math.round(v.cog||0)}°</div></div>
    <div class="d-stat"><div class="d-stat-label">Heading</div><div class="d-stat-value">${v.hdg?Math.round(v.hdg)+'°':'—'}</div></div>
    <div class="d-stat"><div class="d-stat-label">Navigation status</div><div class="d-stat-value" style="font-size:11px">${navlbl}</div></div>
    <div class="d-stat"><div class="d-stat-label">Draught</div><div class="d-stat-value">${v.draught?v.draught+' m':'—'}</div></div>
    <div class="d-stat"><div class="d-stat-label">IMO number</div><div class="d-stat-value mono">${v.imo||'—'}</div></div>
  </div>`;

  html+=`<div style="font-size:10px;color:#3a3d52;margin-top:6px">Live AIS via aisstream.io · Cargo manifest not public · Historical data not available in free tier</div>`;

  document.getElementById('detail-inner').innerHTML=html;
  document.getElementById('detail').classList.add('on');
}

// ── PROTOBUF DECODER ──────────────────────────────────────────
// We use protobufjs (loaded from CDN) to decode GTFS-RT .pb files
let pbRoot = null;
let pbLoaded = false;

async function loadProtobufSchema(){
  if(pbLoaded) return true;
  try{
    // Use the GTFS-RT proto definition embedded as a JS object
    // This avoids needing to load a separate .proto file
    const GTFS_RT_PROTO = `
syntax = "proto2";
message FeedMessage {
  required FeedHeader header = 1;
  repeated FeedEntity entity = 2;
}
message FeedHeader {
  required string gtfs_realtime_version = 1;
  optional uint64 timestamp = 2;
}
message FeedEntity {
  required string id = 1;
  optional VehiclePosition vehicle = 4;
}
message VehiclePosition {
  optional TripDescriptor trip = 1;
  optional VehicleDescriptor vehicle = 8;
  optional Position position = 2;
  optional uint64 timestamp = 5;
  optional int32 current_stop_sequence = 3;
  optional string stop_id = 7;
}
message TripDescriptor {
  optional string trip_id = 1;
  optional string route_id = 5;
  optional string start_time = 2;
  optional string start_date = 3;
}
message VehicleDescriptor {
  optional string id = 1;
  optional string label = 2;
  optional string license_plate = 3;
}
message Position {
  required float latitude = 1;
  required float longitude = 2;
  optional float bearing = 3;
  optional double odometer = 4;
  optional float speed = 5;
}
`;
    // protobufjs is loaded from CDN in the HTML
    if(typeof protobuf === 'undefined'){
      vlog('warn','protobufjs not loaded yet — waiting…');
      await new Promise(r=>setTimeout(r,1000));
      if(typeof protobuf === 'undefined') throw new Error('protobufjs CDN failed to load');
    }
    pbRoot = protobuf.parse(GTFS_RT_PROTO).root;
    pbLoaded = true;
    vlog('ok','GTFS-RT protobuf schema loaded');
    return true;
  }catch(e){
    vlog('error','Protobuf schema load failed: '+e.message);
    return false;
  }
}

// ── GZIP DECOMPRESSION ───────────────────────────────────────
// GTFS-RT feeds are gzip-encoded. Proxies preserve the encoding.
// Browsers don't auto-decompress arrayBuffer — we must do it manually.
async function decompressIfNeeded(buffer){
  const bytes = new Uint8Array(buffer);
  // Check gzip magic bytes: 0x1f 0x8b
  if(bytes[0] === 0x1f && bytes[1] === 0x8b){
    try{
      // DecompressionStream available in Chrome 80+, Firefox 113+, Safari 16.4+
      const ds     = new DecompressionStream('gzip');
      const writer = ds.writable.getWriter();
      const reader = ds.readable.getReader();
      writer.write(bytes);
      writer.close();
      const chunks = [];
      let totalLen = 0;
      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        chunks.push(value);
        totalLen += value.length;
      }
      const out = new Uint8Array(totalLen);
      let offset = 0;
      for(const chunk of chunks){ out.set(chunk, offset); offset += chunk.length; }
      vlog('ok', `  Gzip decompressed: ${buffer.byteLength}b → ${totalLen}b`);
      return out.buffer;
    }catch(e){
      vlog('warn', `  Gzip decompress failed: ${e.message} — trying raw`);
      return buffer;
    }
  }
  return buffer; // not gzip, return as-is
}

// ── FETCH + DECODE a single operator's vehiclepositions.pb ────
async function fetchOperatorPositions(operator, overrideUrl){
  const defaultUrl = `https://openapi.samtrafiken.se/gtfs-rt-sweden/vehiclepositions.pb?key=${TL_KEYS.gtfsSweden3Realtime}`;
  const targetUrl  = overrideUrl || defaultUrl;

  // Try direct first — GTFS-RT APIs send CORS headers for browser origins.
  // Proxies are fallback. All responses may be gzip-encoded — decompress first.
  const attempts = [
    {label:'direct',     url: targetUrl},
    {label:'corsproxy',  url: `https://corsproxy.io/?url=${encodeURIComponent(targetUrl)}`},
    {label:'allorigins', url: `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`},
  ];

  for(const attempt of attempts){
    try{
      vlog('info', `GTFS-RT [${attempt.label}]: ${attempt.url.slice(0,80)}…`);
      const ctrl = new AbortController();
      const tid  = setTimeout(()=>ctrl.abort(), 15000);
      const res  = await fetch(attempt.url, {
        signal:  ctrl.signal,
        headers: {'Accept': 'application/octet-stream, application/x-protobuf, */*'}
      });
      clearTimeout(tid);
      if(!res.ok){ vlog('warn',`  HTTP ${res.status}`); continue; }
      let buf = await res.arrayBuffer();
      if(buf.byteLength < 10){ vlog('warn',`  Too small (${buf.byteLength}b)`); continue; }
      vlog('info', `  Raw: ${buf.byteLength} bytes — checking encoding…`);
      // Decompress gzip if needed (proxies often preserve Content-Encoding)
      buf = await decompressIfNeeded(buf);
      const vehicles = decodePb(buf);
      if(vehicles.length > 0){
        vlog('ok', `  ✓ ${vehicles.length} vehicles decoded via ${attempt.label}`);
        return vehicles;
      }
      vlog('warn', `  Decoded 0 vehicles in viewport (feed OK but no matches)`);
      // Still return empty — don't fall through to next attempt if feed decoded OK
      // (empty viewport is valid — just no vehicles in view right now)
      const FeedMessage = pbRoot.lookupType('FeedMessage');
      const msg = FeedMessage.decode(new Uint8Array(buf));
      const total = (msg.entity||[]).filter(e=>e.vehicle).length;
      vlog('info', `  Feed has ${total} total vehicles globally (${vehicles.length} in viewport)`);
      if(total > 0) return vehicles; // feed is working, just empty viewport
    }catch(e){
      vlog('warn', `  ${attempt.label}: ${e.name==='AbortError'?'timeout (15s)':e.message}`);
    }
  }
  vlog('error', 'All fetch attempts failed — showing demo data');
  return [];
}

// ── DECODE protobuf bytes → array of vehicle objects ──────────
function decodePb(buffer){
  try{
    const FeedMessage = pbRoot.lookupType('FeedMessage');
    const msg = FeedMessage.decode(new Uint8Array(buffer));
    const vehicles = [];
    const bounds = map.getBounds().pad(0.1);
    (msg.entity||[]).forEach(e=>{
      const vp = e.vehicle; if(!vp||!vp.position) return;
      const lat = vp.position.latitude, lng = vp.position.longitude;
      if(!lat||!lng) return;
      // Filter to viewport for performance
      if(!bounds.contains([lat,lng])) return;
      const id = vp.vehicle?.id || vp.vehicle?.label || e.id || '';
      vehicles.push({
        id,
        label:    vp.vehicle?.label || id,
        lat, lng,
        bearing:  vp.position.bearing || 0,
        speed:    vp.position.speed ? Math.round(vp.position.speed*3.6) : 0, // m/s → km/h
        routeId:  vp.trip?.route_id || '—',
        tripId:   vp.trip?.trip_id  || '—',
        routeType:3, // will be enriched from static data later
        line:     vp.trip?.route_id || '—',
        dest:     '—',
        operator: '—',
      });
    });
    return vehicles;
  }catch(e){
    vlog('error','Protobuf decode error: '+e.message);
    return [];
  }
}

// ── MAIN LAND FETCH ───────────────────────────────────────────
async function fetchLandVehicles(){
  if(activeDomain!=='land') return;

  const cfg = LAND_COUNTRY_CONFIG[landCountry];
  if(!cfg){ setStatus('err','Unknown country: '+landCountry); return; }
  if(cfg.status !== 'active'){
    setStatus('load', cfg.flag+' '+cfg.name+' — planned. Showing demo.');
    if(Object.keys(landMap).length===0){ loadLandDemoForCountry(landCountry); renderLand(); }
    return;
  }
  const ok = await loadProtobufSchema();
  if(activeDomain!=='land') return; // user switched away during schema load
  if(!ok){
    vlog('warn','Falling back to land demo (protobuf unavailable)');
    if(Object.keys(landMap).length===0){ loadLandDemoForCountry(landCountry)||loadLandDemo(); renderLand(); }
    setStatus('err','Protobuf unavailable — showing demo for '+landCountry);
    document.getElementById('srcbadge').textContent='trafiklab · demo';
    return;
  }

  const cfg2 = LAND_COUNTRY_CONFIG[landCountry]; // re-read in case country changed
  const fetchUrl = cfg2?.primaryUrl || cfg2?.url || cfg.primaryUrl || cfg.url;
  setStatus('load',`Fetching ${cfg2?.flag||''} ${cfg2?.name||landCountry} vehicle positions…`);
  vlog('info',`GTFS-RT fetch: ${fetchUrl.slice(0,60)}…`);

  const vehicles = await fetchOperatorPositions(landCountry, fetchUrl);

  // IE returns JSON not protobuf
  if(cfg.api==='gtfs_rt_json' && vehicles.length===0){
    try{
      const jsonUrl = cfg.primaryUrl || cfg.url;
      const ctrl2=new AbortController(); const tid2=setTimeout(()=>ctrl2.abort(),8000);
      for(let pi=0;pi<PROXIES.length;pi++){
        const res=await fetch(PROXIES[pi](jsonUrl),{signal:ctrl2.signal}).catch(()=>null);
        if(res&&res.ok){
          clearTimeout(tid2);
          const j=await res.json();
          (j.entity||[]).forEach(e=>{
            const vp=e.vehicle||e; const pos=vp.position||{};
            if(!pos.latitude) return;
            const id=(vp.vehicle?.id||e.id||'').toString();
            vehicles.push({id,label:vp.vehicle?.label||id,lat:pos.latitude,lng:pos.longitude,
              bearing:pos.bearing||0,speed:pos.speed?Math.round(pos.speed*3.6):0,
              routeType:3,line:vp.trip?.route_id||'—',dest:'—',operator:cfg.name,routeId:vp.trip?.route_id||'—',tripId:vp.trip?.trip_id||'—'});
          });
          vlog('ok',`JSON vehicles: ${vehicles.length}`); break;
        }
      }
    }catch(e){ vlog('warn','JSON fetch failed: '+e.message); }
  }

  if(activeDomain!=='land') return; // switched away during fetch
  if(vehicles.length > 0){
    // Merge into landMap
    vehicles.forEach(v=>{ if(v.id) landMap[v.id]=v; });
    // Prune out-of-view
    const bounds = map.getBounds().pad(0.2);
    Object.keys(landMap).forEach(id=>{
      const v=landMap[id];
      if(!bounds.contains([v.lat,v.lng])) delete landMap[id];
    });
    const count = Object.keys(landMap).length;
    document.getElementById('pill').textContent = count.toLocaleString()+' vehicles';
    document.getElementById('srcbadge').textContent = `trafiklab · ${count} vehicles`;
    setStatus('ok',`${count} vehicles in view · ${new Date().toLocaleTimeString()}`);
    renderLand();
  } else {
    vlog('warn','No vehicle positions received — using demo data for '+landCountry);
    // Clear stale markers and load country-appropriate demo
    Object.values(landMarkers).forEach(m=>map.removeLayer(m));
    landMarkers={};
    loadLandDemoForCountry(landCountry);
    if(Object.keys(landMap).length===0) loadLandDemo();
    renderLand();
    setStatus('err',`${LAND_COUNTRY_CONFIG[landCountry]?.flag||''} Live feed unavailable — showing DEMO DATA (not real-time)`);
    document.getElementById('srcbadge').textContent=landCountry+' · demo';
  }
}

// ── RENDER ────────────────────────────────────────────────────
function renderLand(){
  if(activeDomain !== 'land') return;  // never render land markers in other domains
  Object.keys(landMarkers).forEach(id=>{
    if(!landMap[id]){ map.removeLayer(landMarkers[id]); delete landMarkers[id]; }
  });
  Object.keys(landMap).forEach(id=>{
    const v=landMap[id];
    const ti=landTypeInfo(v.routeType||3);
    const isSel=selected===id;
    const color=isSel?'#fff':ti.color;
    const sz=isSel?22:15, op=isSel?1:(!!selected?0.25:0.9);
    if(landMarkers[id]){
      landMarkers[id].setLatLng([v.lat,v.lng]);
      landMarkers[id].setIcon(landVehicleIcon(v.bearing,color,sz,op));
    } else {
      const m=L.marker([v.lat,v.lng],{icon:landVehicleIcon(v.bearing,color,sz,op),zIndexOffset:isSel?2000:0});
      const isDemo = v.id.includes('-demo-') || v.id.match(/^[A-Z]{2}-/);
      m.bindTooltip(
        `<b>${ti.icon} ${v.line!=='—'?v.line+' ':''}</b>${v.dest!=='—'?' → '+v.dest:''}<br>`+
        `${v.speed?v.speed+' km/h':'Stopped'} · ${ti.label}` +
        (isDemo ? '<br><span style="color:#e8a040;font-size:10px">⚠ Demo data — live feed unavailable</span>' : ''),
        {direction:'top',offset:[0,-8]}
      );
      m.on('click',()=>selectLandVehicle(id));
      m.addTo(map); landMarkers[id]=m;
    }
  });
}

// ── SELECT ────────────────────────────────────────────────────
function selectLandVehicle(id){
  if(selected===id){deselectLand();return;}
  selected=id; renderLand();
  const v=landMap[id]; if(!v)return;
  map.flyTo([v.lat,v.lng],13,{duration:0.9,easeLinearity:.5});
  renderLandDetail(v);
}
function deselectLand(){
  selected=null;
  document.getElementById('detail').classList.remove('on');
  document.getElementById('fab').className='';
  renderLand();
}
