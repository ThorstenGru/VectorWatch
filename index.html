/* ════════════════════════════════════════════════════════════
   COUNTRY BBOX LOOKUP — given lat/lng, return country code
   Called on every map moveend/zoomend when land tab is active
════════════════════════════════════════════════════════════ */
function detectCountryFromCenter(lat, lng){
  for(const [code, cfg] of Object.entries(LAND_COUNTRY_CONFIG)){
    const [s,w,n,e] = cfg.bbox;
    if(lat>=s && lat<=n && lng>=w && lng<=e) return code;
  }
  return null; // outside all defined countries
}

/* ════════════════════════════════════════════════════════════
   setLandCountry — switch to a country (from button OR auto)
════════════════════════════════════════════════════════════ */
function setLandCountry(code, el, skipFly){
  if(!LAND_COUNTRY_CONFIG[code]) return;
  const changed = (code !== landCountry);
  landCountry = code;

  // Update button highlight
  document.querySelectorAll('.lc').forEach(b=>b.classList.remove('on'));
  const btn = el || document.getElementById('lc-'+code.toLowerCase());
  if(btn) btn.classList.add('on');

  if(!changed) return; // same country, no need to reload

  // Clear existing land markers
  Object.values(landMarkers).forEach(m=>map.removeLayer(m));
  landMarkers={}; landMap={};

  const cfg = LAND_COUNTRY_CONFIG[code];
  if(!skipFly) map.flyTo(cfg.center, cfg.zoom, {duration:1.0, easeLinearity:.5});

  setStatus('load', `${cfg.flag} ${cfg.name} — connecting to transit feed…`);
  document.getElementById('srcbadge').textContent = code + ' · loading';
  fetchLandVehicles();
}

/* ════════════════════════════════════════════════════════════
   AUTO-DETECT from map viewport center
   Triggered on moveend/zoomend when land domain is active.
   Only switches if center is inside a different country bbox.
════════════════════════════════════════════════════════════ */
function autoDetectCountry(){
  if(activeDomain !== 'land') return;
  const c = map.getCenter();
  const detected = detectCountryFromCenter(c.lat, c.lng);
  if(detected && detected !== landCountry){
    vlog('info', `Auto-detected country: ${detected} (was ${landCountry})`);
    // Update state and button without triggering a separate fetch
    // (the moveend handler already schedules a fetch via _landMoveTimer)
    landCountry = detected;
    document.querySelectorAll('.lc').forEach(b=>b.classList.remove('on'));
    const btn = document.getElementById('lc-'+detected.toLowerCase());
    if(btn) btn.classList.add('on');
    // Fly to new country center
    const cfg = LAND_COUNTRY_CONFIG[detected];
    if(cfg) map.flyTo(cfg.center, cfg.zoom, {duration:1.0, easeLinearity:.5});
    // Clear old markers
    Object.values(landMarkers).forEach(m=>map.removeLayer(m));
    landMarkers={}; landMap={};
    setStatus('load', `${cfg?.flag||''} Switched to ${cfg?.name||detected} — fetching…`);
    // fetchLandVehicles is already scheduled by _landMoveTimer from moveend
  } else if(!detected){
    setStatus('load', '🌍 Pan to a supported European country for live transit data');
  }
}

/* ════════════════════════════════════════════════════════════
   POLL CONTROL
════════════════════════════════════════════════════════════ */
function startLandPoll(){
  // Note: setDomain already did full cleanup before calling this
  // Auto-detect country from map center (sets landCountry, no double fetch)
  const c = map.getCenter();
  const detected = detectCountryFromCenter(c.lat, c.lng);
  if(detected && detected !== landCountry){
    landCountry = detected;
    const btn = document.getElementById('lc-'+detected.toLowerCase());
    document.querySelectorAll('.lc').forEach(b=>b.classList.remove('on'));
    if(btn) btn.classList.add('on');
    vlog('info','Land auto-detect on start: '+detected);
  }
  // Fetch live data directly — no demo shown upfront
  // Demo only shown if ALL fetch attempts fail (handled in fetchLandVehicles)
  setStatus('load', '🚂 Connecting to transit feed…');
  fetchLandVehicles();
  // Re-fetch on map move (debounced via the existing moveTimer pattern)
  map.on('moveend.land zoomend.land', ()=>{
    autoDetectCountry();
    clearTimeout(window._landMoveTimer);
    window._landMoveTimer = setTimeout(fetchLandVehicles, 600);
  });
  landTimer = setInterval(()=>{
    if(activeDomain==='land') fetchLandVehicles();
  }, 12000); // 12s interval
  vlog('info','Land poll started — auto-detect active');
}

function stopLandPoll(){
  if(landTimer){ clearInterval(landTimer); landTimer=null; }
  clearTimeout(window._landMoveTimer);
  map.off('moveend.land'); map.off('zoomend.land');
  Object.values(landMarkers).forEach(m=>map.removeLayer(m));
  landMarkers={}; landMap={};
}

    </div>`,
    className:'', iconAnchor:[0,0]

  airCoverageLayer.addTo(map);
}
function hideAirCoverage(){
  if(airCoverageLayer){ map.removeLayer(airCoverageLayer); airCoverageLayer=null; }
}

function showLandCoverage(){
  if(landCoverageLayer) return; // already shown
  landCoverageLayer = L.layerGroup();

  // Step 1: Dark overlay for the entire world (no data everywhere else)
  // Use a large rectangle minus the supported areas (inverted polygon)
  // Simplest approach: one big world rectangle at low opacity
  L.rectangle([[-85,-180],[85,180]], {
    color:'transparent',
    fillColor:'#0d0f18',
    fillOpacity:0.55,
    interactive:false,
    pane:'tilePane',  // behind everything
  }).addTo(landCoverageLayer);

  // Step 2: Draw each country polygon
  LAND_COVERAGE_AREAS.forEach(area => {
    const isLive    = area.status === 'live';
    const isPartial = area.status === 'partial';
    const borderCol = isLive ? '#00e8c8' : '#e8a040';
    const fillCol   = isLive ? '#00e8c8' : '#e8a040';
    const fillOp    = isLive ? 0.08 : 0.05;
    const borderOp  = isLive ? 0.7  : 0.5;

    const badge = isLive
      ? `<span style="color:#00e8c8;font-weight:600">✓ Live data</span>`
      : `<span style="color:#e8a040;font-weight:600">◑ Partial coverage</span>`;

    L.polygon(area.poly.map(([la,ln])=>[la,ln]), {
      color:       borderCol,
      fillColor:   fillCol,
      weight:      1.5,
      opacity:     borderOp,
      fillOpacity: fillOp,
      dashArray:   isPartial ? '5,4' : null,
      interactive: true,
    })
    .bindTooltip(
      `<b>${area.name}</b> ${badge}<br>` +
      `<span style="color:#6b6e8a">Source:</span> ${area.source}<br>` +
      `<span style="font-size:10px;color:#3a3d52">Click country button above to load</span>`,
      {sticky:true, direction:'top', className:''}
    )
    .on('click', () => {
      // Clicking a country polygon selects that country
      const btn = document.getElementById('lc-'+area.code.toLowerCase());
      if(btn) setLandCountry(area.code, btn, false);
    })
    .addTo(landCoverageLayer);
  });

  // Step 3: "No data" label for rest of world regions
  const noDataRegions = [
    [20,  -100, 'North America — no free open API'],
    [-15, -55,  'South America — no free open API'],
    [2,   20,   'Africa — no free open API'],
    [35,  100,  'Asia — no free open API'],
    [-30, 135,  'Australia / Pacific — no free open API'],
  ];
  noDataRegions.forEach(([lat, lng, label]) => {
    L.marker([lat, lng], {
      icon: L.divIcon({
        html: `<div style="background:rgba(13,15,24,.75);border:1px solid #2a2d42;border-radius:6px;padding:3px 8px;font-size:10px;color:#3a3d52;white-space:nowrap">${label}</div>`,
        className: '',
        iconAnchor: [80, 10],
      }),
      interactive: false,
      zIndexOffset: -1000,
    }).addTo(landCoverageLayer);
  });

  landCoverageLayer.addTo(map);
}

function hideLandCoverage(){
  if(landCoverageLayer){
    map.removeLayer(landCoverageLayer);
    landCoverageLayer = null;
  }
}

/* ── Coverage panel state (persists across domain switches) ── */
let covPanelMinimized = false;

function showCoveragePanel(domain){
  const panel = document.getElementById('cov-panel');
  const cfg   = COV_CONTENT[domain];
  if(!cfg){ panel.classList.remove('on'); return; }

  // Build inner HTML — split into title bar + body
  const titleHtml = `
    <div id="cov-panel-title" onclick="toggleCovPanel()">
      <div id="cov-panel-title-text">${cfg.icon} ${cfg.title}</div>
      <span id="cov-panel-chevron">▼</span>
    </div>`;

  const bodyHtml = `
    <div id="cov-panel-body">
      ${cfg.rows.map(r=>`
        <div class="cv-row">
          <div class="cv-dot" style="background:${r.color}"></div>
          <div class="cv-text">${r.text}</div>
        </div>`).join('')}
      <div class="cv-note">${cfg.note.replace(/\n/g,'<br>')}</div>
    </div>`;

  panel.innerHTML = titleHtml + bodyHtml;
  panel.classList.add('on');

  // Restore minimized state from last time
  if(covPanelMinimized) panel.classList.add('minimized');
  else panel.classList.remove('minimized');
}

function toggleCovPanel(){
  const panel = document.getElementById('cov-panel');
  covPanelMinimized = !panel.classList.contains('minimized');
  panel.classList.toggle('minimized');
}

function hideCoveragePanel(){
  document.getElementById('cov-panel').classList.remove('on');
}
